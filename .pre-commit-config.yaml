repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^services/ingest/tests/fixtures/
      - id: end-of-file-fixer
        exclude: ^services/ingest/tests/fixtures/
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        language_version: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: pnpm-lock.yaml|uv.lock

  - repo: local
    hooks:
      - id: no-direct-commits-to-main
        name: Block direct commits to main
        entry: |
          bash -c '[ "$(git symbolic-ref --short HEAD)" != "main" ] || { echo "ERROR: do not commit directly to main; use a branch + PR."; exit 1; }'
        language: system
        stages: [pre-commit]
        always_run: true
        pass_filenames: false
