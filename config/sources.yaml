# Curated seed sources for MVP.
# This file is the source of truth for `sources.onboarded_by = 'seed'` rows.
# Adding/editing a source: open a PR; the importer (`medevents-ingest seed-sources`)
# upserts these rows on every run.
#
# Source-code naming convention — see docs/runbooks/ada-fixtures.md:
#   - short shared-calendar parsers: organization abbreviation only
#     (ada, gnydm)
#   - single-flagship meetings: abbreviation + event slug, snake_case
#     (aap_annual_meeting, fdi_wdc, eao_congress, cds_midwinter)

- code: ada
  name: American Dental Association
  homepage_url: https://www.ada.org/
  source_type: society
  country_iso: US
  is_active: true
  parser_name: ada_listing
  crawl_frequency: weekly
  crawl_config:
    seed_urls:
      - https://www.ada.org/education/continuing-education/ada-ce-live-workshops
      - https://www.ada.org/education/scientific-session
    pagination: none
    rate_limit_per_minute: 10
  notes: |
    ADA continuing-education live workshops schedule + ADA Scientific Session
    landing. See docs/superpowers/specs/2026-04-20-medevents-w2-first-source-ingestion.md §2.

- code: gnydm
  name: Greater New York Dental Meeting
  homepage_url: https://www.gnydm.com/
  source_type: society
  country_iso: US
  is_active: true
  parser_name: gnydm_listing
  crawl_frequency: weekly
  crawl_config:
    seed_urls:
      - https://www.gnydm.com/about/future-meetings/
      - https://www.gnydm.com/
    pagination: none
    rate_limit_per_minute: 10
  notes: |
    GNYDM future-meetings listing (2026/2027/2028 editions) + homepage detail
    for the current (2026) edition. See
    docs/superpowers/specs/2026-04-21-medevents-w3-1-second-source-gnydm.md.

- code: aap_annual_meeting
  name: American Academy of Periodontology Annual Meeting
  homepage_url: https://am2026.perio.org/
  source_type: society
  country_iso: US
  is_active: true
  parser_name: aap_annual_meeting
  crawl_frequency: monthly
  crawl_config:
    seed_urls:
      - https://am2026.perio.org/
      - https://am2026.perio.org/general-information/
    pagination: none
    rate_limit_per_minute: 6
  notes: |
    AAP Annual Meeting 2026 microsite. Subdomain is edition-specific
    (am2026 → am2027 → ... per edition). Operator must update the two
    seed_urls + homepage_url when the 2027 microsite launches, and
    similarly bump the year check in parsers/aap.py. See
    docs/runbooks/aap-fixtures.md §6.1.

- code: fdi_wdc
  name: FDI World Dental Congress
  homepage_url: https://www.fdiworlddental.org/fdi-world-dental-congress
  source_type: society
  country_iso: CH
  is_active: true
  parser_name: fdi_wdc
  crawl_frequency: monthly
  crawl_config:
    seed_urls:
      - https://www.fdiworlddental.org/fdi-world-dental-congress
      - https://www.fdiworlddental.org/fdi-world-dental-congress-2026
    pagination: none
    rate_limit_per_minute: 6
  notes: |
    FDI World Dental Congress 2026 onboarding. Stable federation hub page +
    year-specific 2026 detail page. Operator must update the detail seed_url
