name: Nightly smoke

on:
  schedule:
    - cron: "17 06 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-smoke
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  happy-path-smoke:
    name: Playwright happy-path smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medevents
          POSTGRES_PASSWORD: medevents # pragma: allowlist secret
          POSTGRES_DB: medevents
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U medevents"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://medevents:medevents@localhost:5432/medevents # pragma: allowlist secret
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 9.12.0
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Enable required extensions on test DB
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS unaccent;"
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS citext;"
      - working-directory: services/ingest
        run: uv sync
      - working-directory: services/ingest
        run: uv run alembic -c ../../db/migrations/alembic.ini upgrade head
      - run: pnpm install --frozen-lockfile
      - name: Seed sources
        working-directory: services/ingest
        run: uv run medevents-ingest seed-sources --path ../../config/sources.yaml
      - name: Seed happy-path smoke fixtures
        working-directory: apps/web
        run: node scripts/seed-happy-path-smoke.mjs
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run happy-path smoke
        working-directory: apps/web
        env:
          RUN_FULL_SMOKE: "1"
        run: pnpm exec playwright test tests/e2e/happy-path-smoke.spec.ts
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-happy-path-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
