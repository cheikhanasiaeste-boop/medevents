services:
  postgres:
    image: postgres:16-alpine
    container_name: medevents-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medevents
      POSTGRES_PASSWORD: medevents # pragma: allowlist secret
      POSTGRES_DB: medevents
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medevents -d medevents"]
      interval: 5s
      timeout: 5s
      retries: 10
